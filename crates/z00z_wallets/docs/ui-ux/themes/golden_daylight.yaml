# Z00Z Wallet - Golden Daylight Theme
# Light mode theme with golden accents
# Date: 2025-12-14
# Version: 1.1.0
# WCAG AA Compliant

theme_id: golden_daylight
name: "Golden Daylight"
description: "Professional light theme with golden accents"
version: "1.1.0"

# Base color palette for light mode
base_palette:
  white: "#FFFFFF"           # Pure white - main background
  light_gray: "#F8F9FA"      # Very light gray - secondary background
  medium_gray: "#DEE2E6"     # Medium gray - borders, dividers
  deep_navy: "#000814"       # Deep navy - primary text
  navy_blue: "#003566"       # Navy blue - secondary text, icons
  warm_gold: "#CC9900"       # Warm gold - primary accent (darker than twilight)
  success_green: "#2A9D8F"   # Teal green - success states
  warning_orange: "#E76F51"  # Orange - warnings
  error_red: "#C1121F"       # Deep red - errors
  info_blue: "#0077B6"       # Blue - informational
  disabled_gray: "#6C757D"   # Gray - disabled states
  muted_gray: "#A8AEBE"      # Muted gray - tertiary text

# Semantic color mapping for UI components
semantic:
  # Background layers
  background:
    primary: "white"          # Main app background
    secondary: "light_gray"   # Panels, cards, sections
    tertiary: "medium_gray"   # Input fields, buttons background
  
  # Foreground/Text
  foreground:
    primary: "deep_navy"      # Primary text, titles
    secondary: "navy_blue"    # Secondary text, labels
    tertiary: "disabled_gray" # Dimmed text, hints
    inverse: "white"          # Text on dark backgrounds
  
  # Borders
  border:
    normal: "medium_gray"     # Default borders
    focus: "warm_gold"        # Focused element borders
    active: "navy_blue"       # Active/selected borders
    inactive: "light_gray"    # Disabled borders
  
  # States
  state:
    success: "success_green"  # Success messages
    warning: "warning_orange" # Warnings
    error: "error_red"        # Errors
    info: "info_blue"         # Info messages
  
  # Interactive elements
  interactive:
    primary: "warm_gold"      # Primary buttons, links
    hover: "navy_blue"        # Hover state
    active: "navy_blue"       # Active/pressed state
    disabled: "disabled_gray" # Disabled state
  
  # Selection/Highlighting
  selection:
    background: "medium_gray" # Selected item background
    text: "deep_navy"         # Selected item text
    border: "warm_gold"       # Selected item border
  
  # Privacy levels (for sensitive data)
  privacy:
    public: "deep_navy"       # Public data
    metadata: "navy_blue"     # Metadata (IDs, timestamps)
    sensitive: "disabled_gray" # Hidden sensitive data (amounts, addresses)
    secret: "light_gray"      # Completely hidden (seed phrases)

# Component-specific styling
components:
  # Menu widget
  menu:
    background: "white"
    title:
      color: "deep_navy"
      bold: true
    subtitle:
      color: "navy_blue"
      italic: true
    item:
      normal:
        icon: "warm_gold"
        label: "deep_navy"
        description: "navy_blue"
      selected:
        icon: "navy_blue"
        label: "deep_navy"
        description: "navy_blue"
        border: "warm_gold"
      disabled:
        icon: "disabled_gray"
        label: "disabled_gray"
        description: "muted_gray"
  
  # Form widget
  form:
    background: "white"
    field:
      label:
        color: "navy_blue"
      input:
        background: "light_gray"
        text: "deep_navy"
        border: "medium_gray"
        focus_border: "warm_gold"
        placeholder: "disabled_gray"
      error:
        text: "error_red"
        border: "error_red"
      hint:
        color: "navy_blue"
        italic: true
    button:
      submit:
        background: "warm_gold"
        text: "white"
        border: "warm_gold"
      cancel:
        background: "medium_gray"
        text: "deep_navy"
        border: "medium_gray"
  
  # Table widget
  table:
    background: "white"
    header:
      background: "light_gray"
      text: "deep_navy"
      border: "medium_gray"
      bold: true
    row:
      normal:
        background: "white"
        text: "deep_navy"
      alternate:
        background: "light_gray"
        text: "deep_navy"
      selected:
        background: "medium_gray"
        text: "deep_navy"
        border: "warm_gold"
      hover:
        background: "light_gray"
        text: "deep_navy"
    empty_message:
      color: "disabled_gray"
      italic: true
  
  # Summary/Details widget
  summary:
    background: "white"
    section:
      title:
        color: "navy_blue"
        bold: true
      border: "medium_gray"
    field:
      label:
        color: "navy_blue"
      value:
        color: "deep_navy"
      placeholder:
        color: "disabled_gray"
        italic: true
  
  # Message/Dialog widget
  message:
    success:
      background: "light_gray"
      text: "success_green"
      border: "success_green"
      icon: "success_green"
    error:
      background: "light_gray"
      text: "error_red"
      border: "error_red"
      icon: "error_red"
    warning:
      background: "light_gray"
      text: "warning_orange"
      border: "warning_orange"
      icon: "warning_orange"
    info:
      background: "light_gray"
      text: "info_blue"
      border: "info_blue"
      icon: "info_blue"
  
  # Spinner/Loading
  spinner:
    color: "warm_gold"
    background: "white"
  
  # Progress bar
  progress:
    background: "light_gray"
    fill: "warm_gold"
    text: "deep_navy"
  
  # Balance bar (wallet specific)
  balance_bar:
    background: "light_gray"
    border: "medium_gray"
    label:
      color: "navy_blue"
    value:
      color: "deep_navy"
      bold: true
    asset_symbol:
      color: "warm_gold"

# Contrast ratios for WCAG AA compliance
contrast_ratios:
  deep_navy_on_white: 16.8          # AAA (primary text)
  navy_blue_on_white: 8.1           # AAA (secondary text)
  warm_gold_on_white: 4.2           # AA (accents)
  disabled_gray_on_white: 4.6       # AA (disabled text)
  white_on_warm_gold: 3.1           # AA Large (buttons)
  deep_navy_on_light_gray: 15.5     # AAA (table headers)

# Special effects
effects:
  shadow:
    enabled: false  # TUI doesn't support shadows
  blur:
    enabled: false  # TUI doesn't support blur
  animation:
    enabled: true
    duration_ms: 200

# Accessibility
accessibility:
  high_contrast: false
  color_blind_safe: true  # Gold/Blue palette is colorblind-friendly
  minimum_contrast_ratio: 4.5  # WCAG AA

# Notes for implementers
implementation_notes:
  - "Use ratatui::style::Color::Rgb for hex colors"
  - "Map semantic colors to palette colors at runtime"
  - "Support theme switching without restart"
  - "Cache color mappings for performance"
  - "Validate contrast ratios in tests"
  - "Light mode requires higher contrast for readability"
