# Golden Twilight Theme - Dark Mode
# Version: 1.1.0
# WCAG AAA Compliant

theme_id: golden_twilight
name: "Golden Twilight"
description: "Professional dark theme with golden accents"
version: "1.1.0"

# Base color palette - exact hex values per spec
base_palette:
  deep_black: "#000814"      # RGB(0, 8, 20)
  navy_dark: "#001D3D"       # RGB(0, 29, 61)
  navy_blue: "#003566"       # RGB(0, 53, 102)
  golden: "#FFC300"          # RGB(255, 195, 0)
  bright_yellow: "#FFD60A"   # RGB(255, 214, 10)

# Semantic mappings - direct hex values per spec
background:
  primary: "#000814"
  secondary: "#001D3D"
  tertiary: "#003566"

foreground:
  primary: "#FFD60A"
  secondary: "#FFC300"
  tertiary: "#003566"
  inverse: "#000814"

borders:
  normal: "#003566"
  focus: "#FFC300"
  active: "#FFD60A"
  inactive: "#001D3D"

states:
  success: "#00FF00"
  warning: "#FFC300"
  error: "#FF0000"
  info: "#FFD60A"

interactive:
  primary: "#FFC300"
  hover: "#FFD60A"
  active: "#FFD60A"
  disabled: "#003566"

# WCAG contrast ratios for accessibility verification
contrast_ratios:
  bright_yellow_on_deep_black: 18.5  # AAA
  golden_on_deep_black: 14.2         # AAA
  navy_blue_on_deep_black: 3.8      # AA
  bright_yellow_on_navy_blue: 4.9   # AA
