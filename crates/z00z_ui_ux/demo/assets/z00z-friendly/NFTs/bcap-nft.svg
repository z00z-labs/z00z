<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 250 250" fill="none" shape-rendering="geometricPrecision">
  <title>BCAP NFT icon</title>
  <metadata>Clean geometric reconstruction: one central pentagon and fifteen square network nodes.</metadata>

  <circle cx="125" cy="125" r="124.5" fill="#F8F8F8" stroke="#E6E6E6" stroke-width="0.5"/>

  <g id="bcap-network" fill="#000000">
    <g id="connectors" stroke="#000000" stroke-width="4" stroke-linecap="butt">
      <line x1="126" y1="124" x2="113.64" y2="85.96"/>
      <line x1="126" y1="124" x2="158.36" y2="100.49"/>
      <line x1="126" y1="124" x2="158.36" y2="147.51"/>
      <line x1="126" y1="124" x2="113.64" y2="162.04"/>
      <line x1="126" y1="124" x2="86" y2="124"/>
    </g>

    <polygon id="central-pentagon" points="100.5,124 118.12,99.75 146.63,109.01 146.63,138.99 118.12,148.25"/>

    <g id="inner-squares">
      <rect x="-10" y="-10" width="20" height="20" transform="translate(113.64 85.96) rotate(27)"/>
      <rect x="-10" y="-10" width="20" height="20" transform="translate(158.36 100.49) rotate(9)"/>
      <rect x="-10" y="-10" width="20" height="20" transform="translate(158.36 147.51) rotate(-9)"/>
      <rect x="-10" y="-10" width="20" height="20" transform="translate(113.64 162.04) rotate(-27)"/>
      <rect x="-10" y="-10" width="20" height="20" transform="translate(86 124) rotate(45)"/>
    </g>

    <g id="middle-squares">
      <rect x="-7.5" y="-7.5" width="15" height="15" transform="translate(106.8 56.5) rotate(36)"/>
      <rect x="-7.5" y="-7.5" width="15" height="15" transform="translate(183.85 84.6) rotate(18)"/>
      <rect x="-7" y="-7" width="14" height="14" transform="translate(181 167)"/>
      <rect x="-7.5" y="-7.5" width="15" height="15" transform="translate(101.9 189.5) rotate(-18)"/>
      <rect x="-7.5" y="-7.5" width="15" height="15" transform="translate(55.9 121.2) rotate(-36)"/>
    </g>

    <g id="outer-squares">
      <rect x="-5" y="-5" width="10" height="10" transform="translate(109.5 32.5) rotate(-36)"/>
      <rect x="-5" y="-5" width="10" height="10" transform="translate(207.5 80) rotate(45)"/>
      <rect x="-5" y="-5" width="10" height="10" transform="translate(192.8 187.9) rotate(14)"/>
      <rect x="-4.5" y="-4.5" width="9" height="9" transform="translate(85.5 207.5)"/>
      <rect x="-5" y="-5" width="10" height="10" transform="translate(34 111)"/>
    </g>
  </g>
</svg>
