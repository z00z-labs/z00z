<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <title>zcash zec logo, Z00Z locked cross-chain variant</title>
  <metadata>Z00Z gold-ring marker for a locked or cross-chain coin.</metadata>
  <defs>
