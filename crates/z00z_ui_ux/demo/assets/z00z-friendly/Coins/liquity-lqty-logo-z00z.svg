      <stop offset="1" stop-color="#FFE6A3"/>
    </linearGradient>
    <filter id="z00z-ring-shadow" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#9D5900" flood-opacity="0.62"/>
    </filter>
  </defs>
  <g id="base-coin">
    <svg width="820" height="820" viewBox="69.93 69.93 400.14 400.14" fill="none" xmlns="http://www.w3.org/2000/svg" x="90" y="90">
    <ellipse cx="270" cy="270" rx="200" ry="200" fill="#95CBF3"/>
    <path d="M270.001 470C380.457 470 470 380.457 470 270C470 246.719 466.022 224.367 458.709 203.587C455.09 203.428 451.45 203.348 447.792 203.348C310.309 203.348 197.559 321.562 203.584 458.708C224.365 466.022 246.718 470 270.001 470Z" fill="#405AE5"/>
    <path d="M203.335 81.3778V447.374L206.142 459.025V459.502L203.335 458.618C125.655 431.163 70 357.08 70 269.998C70 182.916 125.655 108.833 203.335 81.3778Z" fill="#405AE5"/>
    </svg>
