mode: local-only
allowed_paths:
  - crates
  - scripts
  - .github
  - .planning/phases/066-Strix
  - tools
  - Cargo.toml
  - pack_z00z_project.sh
  - unpack_z00z_project.sh
excluded_paths:
  - .git
  - target
  - crates/z00z_crypto/tari
  - tools/formal_verification
  - .planning/graphs
allowed_hosts:
  - 127.0.0.1
  - localhost
allowed_urls: []
forbidden:
  - public-targets
  - public-recon
  - credential-attacks
  - exploit-frameworks
  - automated-exploitation
  - arbitrary-command-execution
rate_limits:
  requests_per_second: 2
  max_concurrency: 2
  timeout_seconds: 30
evidence_required: true
