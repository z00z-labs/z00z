services:
  hjmt-local-devnet:
    image: rust:1.89
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command:
      - bash
      - scripts/hjmt_local_devnet.sh
      - --profile
      - sim_5a7s
      - --smoke
      - --timeout
      - "30"
    environment:
      CARGO_TARGET_DIR: /workspace/target
      Z00Z_HJMT_LOCAL_DEVNET_RUN_ID: compose-sim-5a7s
      Z00Z_HJMT_LOCAL_DEVNET_ARTIFACT_ROOT: /workspace/reports/hjmt-local-devnet/compose-sim-5a7s
