    <div class="concept-banner" role="note">
      <span class="concept-dot" aria-hidden="true"></span>
      <span data-i18n="app.interactiveConcept">Interactive concept · no real funds</span>
    </div>

    <section class="lock-screen" id="lock-screen" aria-labelledby="lock-title" hidden>
      <div class="lock-card">
        <div class="brand brand-centered">
          <img class="brand-mark" src="logo-31-bg.png" alt="">
          <span>Z00Z</span>
        </div>
        <div class="lock-icon"><svg class="icon"><use href="#i-lock"/></svg></div>
        <p class="eyebrow">Private wallet</p>
        <h1 id="lock-title">Welcome back</h1>
        <p class="muted" id="lock-wallet-label">Everyday wallet <span aria-hidden="true">·</span> <span class="mono">8F2A…71C0</span></p>
        <form id="unlock-form" novalidate>
          <label class="field-label" for="unlock-password">Wallet password</label>
          <div class="password-wrap">
            <input id="unlock-password" name="password" type="password" autocomplete="current-password" minlength="4" required>
            <button class="icon-button field-icon" type="button" data-toggle-password aria-label="Show password">
              <svg class="icon"><use href="#i-eye"/></svg>
            </button>
          </div>
          <p class="field-error" id="unlock-error" role="alert"></p>
          <button class="button button-primary button-full" type="submit">
            <svg class="icon"><use href="#i-lock"/></svg> Unlock wallet
          </button>
        </form>
        <button class="button button-quiet button-full" type="button" data-demo-action="switch-wallet">Switch wallet</button>
        <p class="lock-note"><svg class="icon"><use href="#i-shield"/></svg> Session data is cleared when the wallet locks.</p>
      </div>
    </section>

    <div class="app-shell" id="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <img class="brand-mark" src="logo-31-bg.png" alt="">
          <span>Z00Z</span>
        </div>
        <p class="sidebar-label" data-i18n="app.wallets">Wallets</p>
        <div class="wallet-nav-viewport">
          <nav class="wallet-nav" id="wallet-nav" aria-label="Wallets"></nav>
        </div>
        <p class="sidebar-label sidebar-network-label" data-i18n="app.network">Network</p>
        <nav class="network-nav" id="network-nav" aria-label="Network routes"></nav>
        <div class="sidebar-spacer"></div>
        <nav class="system-nav" aria-label="Application actions">
          <button class="nav-item" type="button" data-view="settings"><svg class="icon"><use href="#i-settings"/></svg><span data-i18n="app.settings">Settings</span></button>
          <button class="nav-item" type="button" data-demo-action="logout"><svg class="icon"><use href="#i-logout"/></svg><span data-i18n="app.logOut">Log out</span></button>
        </nav>
        <p class="build-label" data-i18n="app.conceptBuild">Concept 0.4 · no real funds</p>
      </aside>

      <div class="app-column">
        <header class="topbar">
          <div class="mobile-brand" role="img" aria-label="Z00Z"><img class="brand-mark" src="logo-31-bg.png" alt=""></div>
          <div class="topbar-address-group">
            <div class="page-heading">
              <h1 id="page-title">Home</h1>
              <p id="page-context">Your private money at a glance</p>
            </div>
            <button class="icon-button address-copy" id="copy-wallet-address" type="button" data-demo-action="copy-wallet-address" aria-label="Copy selected wallet address" title="Copy selected wallet address">
              <svg class="icon"><use href="#i-copy"/></svg>
            </button>
          </div>
          <button class="wallet-identity" id="wallet-identity" type="button" data-demo-action="switch-wallet" aria-live="polite"></button>
          <button class="icon-button" type="button" data-demo-action="toggle-balance" aria-label="Hide sensitive amounts" title="Hide sensitive amounts">
            <svg class="icon"><use href="#i-eye"/></svg>
          </button>
          <button class="icon-button topbar-notification" type="button" data-demo-action="notifications" aria-label="Notifications, one unread" title="Notifications">
            <svg class="icon"><use href="#i-bell"/></svg><span class="notification-dot"></span>
          </button>
          <button class="icon-button account-button" type="button" data-view="settings" aria-label="Open account settings" title="Account settings">
            <svg class="icon"><use href="#i-user"/></svg>
          </button>
        </header>

        <nav class="wallet-tabs" id="wallet-tabs" aria-label="Selected wallet"></nav>
        <main class="main-content" id="main-content" tabindex="-1"></main>
        <footer class="wallet-statusbar" id="wallet-statusbar" aria-label="Selected wallet status"></footer>
      </div>

      <nav class="bottom-nav" aria-label="Mobile navigation">
        <button class="bottom-nav-item is-active" type="button" data-view="home"><svg class="icon"><use href="#i-home"/></svg><span data-i18n="nav.home">Home</span></button>
        <button class="bottom-nav-item" type="button" data-view="wallet"><svg class="icon"><use href="#i-wallet"/></svg><span data-i18n="nav.assets">Assets</span><span class="notification-dot"></span></button>
        <button class="bottom-nav-item" type="button" data-view="activity"><svg class="icon"><use href="#i-activity"/></svg><span data-i18n="nav.history">History</span></button>
        <button class="bottom-nav-item" type="button" data-view="settings"><svg class="icon"><use href="#i-settings"/></svg><span data-i18n="nav.settings">Settings</span></button>
      </nav>
    </div>

    <dialog class="flow-dialog" id="flow-dialog" aria-labelledby="dialog-title">
      <div id="dialog-content"></div>
    </dialog>

    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>

</html>
