<!DOCTYPE html>
<html lang="en" data-theme="dark" data-palette="z00z-default">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" content="#081019">
    <meta name="description" content="Interactive UI/UX concept for the Z00Z private wallet.">
    <link rel="icon" type="image/png" href="logo-31-bg.png">
    <title>Z00Z Wallet — Interactive Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;780&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to wallet content</a>

    <svg class="svg-sprite" aria-hidden="true">
      <symbol id="i-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></symbol>
      <symbol id="i-wallet" viewBox="0 0 24 24"><path d="M4 5h14a2 2 0 0 1 2 2v12H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/><path d="M16 10h6v5h-6a2.5 2.5 0 0 1 0-5Z"/><path d="M5 5V3h12"/></symbol>
      <symbol id="i-spark" viewBox="0 0 24 24"><path d="m12 3 1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6Z"/><path d="m19 15 .8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8Z"/></symbol>
      <symbol id="i-activity" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5M12 7v5l3 2"/></symbol>
      <symbol id="i-swap" viewBox="0 0 24 24"><path d="M7 7h12m0 0-3-3m3 3-3 3M17 17H5m0 0 3 3m-3-3 3-3"/></symbol>
      <symbol id="i-exchange" viewBox="0 0 24 24"><path d="M7 7h9a4 4 0 0 1 4 4v1"/><path d="m17 9 3 3-3 3M17 17H8a4 4 0 0 1-4-4v-1"/><path d="m7 15-3-3 3-3"/></symbol>
      <symbol id="i-staking" viewBox="0 0 24 24"><path d="M12 3v10m-4-4 4 4 4-4"/><path d="M5 14v5h14v-5"/><path d="M4 21h16"/></symbol>
      <symbol id="i-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"/></symbol>
      <symbol id="i-send" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
      <symbol id="i-receive" viewBox="0 0 24 24"><path d="M19 12H5m6 6-6-6 6-6"/></symbol>
      <symbol id="i-claim" viewBox="0 0 24 24"><path d="M5 4h14v5a3 3 0 0 0 0 6v5H5v-5a3 3 0 0 0 0-6Z"/><path d="M12 7v10"/></symbol>
      <symbol id="i-permission" viewBox="0 0 24 24"><path d="M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/><path d="M12 11v10M8 17h8"/></symbol>
      <symbol id="i-eye" viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></symbol>
      <symbol id="i-eye-off" viewBox="0 0 24 24"><path d="m3 3 18 18M10.6 6.1A11 11 0 0 1 12 6c6 0 9.5 6 9.5 6a16 16 0 0 1-2.2 2.8M6.2 6.2C3.8 8 2.5 12 2.5 12s3.5 6 9.5 6a9.8 9.8 0 0 0 3-.5"/><path d="M10 10a2.8 2.8 0 0 0 4 4"/></symbol>
      <symbol id="i-lock" viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></symbol>
      <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 3 4 6v5c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6Z"/><path d="m8.5 12 2.2 2.2 4.8-5"/></symbol>
      <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9ZM10 21h4"/></symbol>
      <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></symbol>
      <symbol id="i-chevron" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></symbol>
      <symbol id="i-copy" viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></symbol>
      <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
      <symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
      <symbol id="i-moon" viewBox="0 0 24 24"><path d="M20 15.5A8.5 8.5 0 0 1 8.5 4 8.5 8.5 0 1 0 20 15.5Z"/></symbol>
      <symbol id="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></symbol>
      <symbol id="i-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></symbol>
      <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 3 2.5 20h19Z"/><path d="M12 9v5M12 17.5v.1"/></symbol>
      <symbol id="i-search" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="m16 16 5 5"/></symbol>
      <symbol id="i-backup" viewBox="0 0 24 24"><path d="M12 3v11m-4-4 4 4 4-4"/><path d="M5 15v5h14v-5"/></symbol>
      <symbol id="i-network" viewBox="0 0 24 24"><path d="M4 9a12 12 0 0 1 16 0M7 12.5a7 7 0 0 1 10 0M10 16a3 3 0 0 1 4 0"/><circle cx="12" cy="19" r="1"/></symbol>
      <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="i-logout" viewBox="0 0 24 24"><path d="M10 5H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h5"/><path d="m14 16 4-4-4-4M18 12H9"/></symbol>
      <symbol id="i-remove" viewBox="0 0 24 24"><path d="M4 7h16M10 11v6m4-6v6M9 7l1-3h4l1 3M6 7l1 13h10l1-13"/></symbol>
    </svg>

    <div class="concept-banner" role="note">
      <span class="concept-dot" aria-hidden="true"></span>
      Interactive concept · no real funds
    </div>

    <section class="lock-screen" id="lock-screen" aria-labelledby="lock-title" hidden>
      <div class="lock-card">
        <div class="brand brand-centered">
          <img class="brand-mark" src="logo-31-bg.png" alt="">
          <span>Z00Z</span>
        </div>
        <div class="lock-icon"><svg class="icon"><use href="#i-lock"/></svg></div>
        <p class="eyebrow">Private wallet</p>
        <h1 id="lock-title">Welcome back</h1>
        <p class="muted" id="lock-wallet-label">Everyday wallet <span aria-hidden="true">·</span> <span class="mono">8F2A…71C0</span></p>
        <form id="unlock-form" novalidate>
          <label class="field-label" for="unlock-password">Wallet password</label>
          <div class="password-wrap">
            <input id="unlock-password" name="password" type="password" autocomplete="current-password" minlength="4" required>
            <button class="icon-button field-icon" type="button" data-toggle-password aria-label="Show password">
              <svg class="icon"><use href="#i-eye"/></svg>
            </button>
          </div>
          <p class="field-error" id="unlock-error" role="alert"></p>
          <button class="button button-primary button-full" type="submit">
            <svg class="icon"><use href="#i-lock"/></svg> Unlock wallet
          </button>
        </form>
        <button class="button button-quiet button-full" type="button" data-demo-action="switch-wallet">Switch wallet</button>
        <p class="lock-note"><svg class="icon"><use href="#i-shield"/></svg> Session data is cleared when the wallet locks.</p>
      </div>
    </section>

    <div class="app-shell" id="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <img class="brand-mark" src="logo-31-bg.png" alt="">
          <span>Z00Z</span>
        </div>
        <p class="sidebar-label">Wallets</p>
        <div class="wallet-nav-viewport">
          <nav class="wallet-nav" id="wallet-nav" aria-label="Wallets"></nav>
        </div>
        <p class="sidebar-label sidebar-network-label">Network</p>
        <nav class="network-nav" id="network-nav" aria-label="Network routes"></nav>
        <div class="sidebar-spacer"></div>
        <nav class="system-nav" aria-label="Application actions">
          <button class="nav-item" type="button" data-view="settings"><svg class="icon"><use href="#i-settings"/></svg><span>Settings</span></button>
          <button class="nav-item" type="button" data-demo-action="logout"><svg class="icon"><use href="#i-logout"/></svg><span>Log out</span></button>
        </nav>
        <p class="build-label">Concept 0.4 · no real funds</p>
      </aside>

      <div class="app-column">
        <header class="topbar">
          <div class="mobile-brand" role="img" aria-label="Z00Z"><img class="brand-mark" src="logo-31-bg.png" alt=""></div>
          <div class="topbar-address-group">
            <div class="page-heading">
              <h1 id="page-title">Home</h1>
              <p id="page-context">Your private money at a glance</p>
            </div>
            <button class="icon-button address-copy" id="copy-wallet-address" type="button" data-demo-action="copy-wallet-address" aria-label="Copy selected wallet address" title="Copy selected wallet address">
              <svg class="icon"><use href="#i-copy"/></svg>
            </button>
          </div>
          <button class="wallet-identity" id="wallet-identity" type="button" data-demo-action="switch-wallet" aria-live="polite"></button>
          <button class="icon-button" type="button" data-demo-action="toggle-balance" aria-label="Hide sensitive amounts" title="Hide sensitive amounts">
            <svg class="icon"><use href="#i-eye"/></svg>
          </button>
          <button class="icon-button topbar-notification" type="button" data-demo-action="notifications" aria-label="Notifications, one unread" title="Notifications">
            <svg class="icon"><use href="#i-bell"/></svg><span class="notification-dot"></span>
          </button>
          <button class="icon-button account-button" type="button" data-view="settings" aria-label="Open account settings" title="Account settings">
            <svg class="icon"><use href="#i-user"/></svg>
          </button>
        </header>

        <nav class="wallet-tabs" id="wallet-tabs" aria-label="Selected wallet"></nav>
        <main class="main-content" id="main-content" tabindex="-1"></main>
        <footer class="wallet-statusbar" id="wallet-statusbar" aria-label="Selected wallet status"></footer>
      </div>

      <nav class="bottom-nav" aria-label="Mobile navigation">
        <button class="bottom-nav-item is-active" type="button" data-view="home"><svg class="icon"><use href="#i-home"/></svg><span>Home</span></button>
        <button class="bottom-nav-item" type="button" data-view="wallet"><svg class="icon"><use href="#i-wallet"/></svg><span>Assets</span><span class="notification-dot"></span></button>
        <button class="bottom-nav-item" type="button" data-view="activity"><svg class="icon"><use href="#i-activity"/></svg><span>History</span></button>
        <button class="bottom-nav-item" type="button" data-view="settings"><svg class="icon"><use href="#i-settings"/></svg><span>Settings</span></button>
      </nav>
    </div>

    <dialog class="flow-dialog" id="flow-dialog" aria-labelledby="dialog-title">
      <div id="dialog-content"></div>
    </dialog>

    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script src="app.js"></script>
  </body>
</html>
