name: publish-wallet-demo

on:
  push:
    branches: [main]
  # Version commits contain [skip ci]. The separately emitted tag-create event
  # remains the automatic deployment signal for every version-manager release.
  create:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'create' || (github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate self-contained demo bundle
        working-directory: crates/z00z_ui_ux/demo
        run: |
          node scripts/check-locales.mjs
          node scripts/test-port-contracts.mjs
          node scripts/check-port-readiness.mjs
          node scripts/test-pages-release.mjs

      - name: Prepare static demo
        run: |
          mkdir -p _site/wallet-demo
          cp -R crates/z00z_ui_ux/demo/. _site/wallet-demo/
          node crates/z00z_ui_ux/demo/scripts/build-pages-release.mjs _site/wallet-demo "$GITHUB_SHA" "$GITHUB_REF_NAME"
          printf '%s\n' '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=./wallet-demo/"><title>Z00Z Wallet Demo</title><a href="./wallet-demo/">Open Z00Z Wallet Demo</a>' > _site/index.html
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}wallet-demo/
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
