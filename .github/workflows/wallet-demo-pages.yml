name: publish-wallet-demo

on:
  push:
    branches: [main]
    paths:
      - ".planning/phases/110-Wallet-UX-UI/demo/**"
      - ".github/workflows/wallet-demo-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static demo
        run: |
          mkdir -p _site/wallet-demo
          cp -R .planning/phases/110-Wallet-UX-UI/demo/. _site/wallet-demo/
          printf '%s\n' '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=./wallet-demo/"><title>Z00Z Wallet Demo</title><a href="./wallet-demo/">Open Z00Z Wallet Demo</a>' > _site/index.html
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}wallet-demo/
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
